services:
  backend:
    ports:
      - "${HOST_BACKEND_PORT:-18437}:8000"

  frontend:
    ports:
      - "${HOST_FRONTEND_PORT:-53172}:80"
    build:
      args:
        - VITE_API_URL=${VITE_API_URL?Variable not set}
        - NODE_ENV=production

  # Keep Adminer off by default in deployed environments.
  adminer:
    profiles:
      - tools

networks:
  # In this deployment mode there's no external Traefik network.
  traefik-public:
    external: false
